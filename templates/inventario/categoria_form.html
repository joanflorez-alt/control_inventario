{% extends 'inventario/base.html' %}
{% block title %}{% if categoria %}Editar{% else %}Nueva{% endif %} categoría{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{% url 'inventario:categorias' %}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">{% if categoria %}Editar categoría{% else %}Nueva categoría{% endif %}</h4>
</div>

<div class="row">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold small">Nombre <span class="text-danger">*</span></label>
            <input type="text" name="nombre" value="{{ categoria.nombre|default:'' }}"
                   class="form-control" placeholder="Nombre de la categoría" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Descripción</label>
            <textarea name="descripcion" class="form-control" rows="3"
                      placeholder="Descripción opcional">{{ categoria.descripcion|default:'' }}</textarea>
          </div>
          <div class="d-flex gap-2 pt-3 border-top">
            <button type="submit" class="btn btn-dark px-4">
              <i class="bi bi-check-lg me-1"></i>Guardar
            </button>
            <a href="{% url 'inventario:categorias' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
