<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Control de Inventario{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1a1a2e;">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="{% url 'inventario:dashboard' %}">
      <i class="bi bi-box-seam me-2"></i>Inventario
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'inventario:dashboard' %}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'producto' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'inventario:productos' %}">
            <i class="bi bi-tags me-1"></i>Productos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'categoria' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'inventario:categorias' %}">
            <i class="bi bi-grid me-1"></i>Categorías
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'inventario' or request.resolver_match.url_name == 'inventario_editar' %}active{% endif %}"
             href="{% url 'inventario:inventario' %}">
            <i class="bi bi-archive me-1"></i>Inventario
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'movimiento' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'inventario:movimientos' %}">
            <i class="bi bi-arrow-left-right me-1"></i>Movimientos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'acciones' %}active{% endif %}"
             href="{% url 'inventario:acciones' %}">
            <i class="bi bi-clock-history me-1"></i>Acciones
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light opacity-75 small">
          <i class="bi bi-person-circle me-1"></i>{{ user.username }}
        </span>
        <a href="{% url 'inventario:logout' %}" class="btn btn-sm btn-outline-danger">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </a>
      </div>
    </div>
  </div>
</nav>
{% endif %}

<main class="container-fluid px-4 py-4" style="max-width: 1200px; margin: 0 auto;">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} alert-dismissible fade show" role="alert">
        <i class="bi bi-{% if msg.tags == 'error' %}exclamation-triangle{% else %}check-circle{% endif %} me-2"></i>
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
