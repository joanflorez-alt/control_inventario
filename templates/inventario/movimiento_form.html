{% extends 'inventario/base.html' %}
{% block title %}Nuevo movimiento{% endblock %}

{% block content %}
<h2>Registrar movimiento de inventario</h2>

<form method="post" class="formulario">
  {% csrf_token %}
  <div class="campo">
    <label>Producto *</label>
    <select name="producto" required>
      <option value="">Selecciona un producto</option>
      {% for p in productos %}
        <option value="{{ p.id }}">{{ p.nombre }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="campo">
    <label>Tipo *</label>
    <select name="tipo" required>
      <option value="entrada">Entrada</option>
      <option value="salida">Salida</option>
    </select>
  </div>
  <div class="campo">
    <label>Cantidad *</label>
    <input type="number" name="cantidad" min="1" required>
  </div>
  <div class="campo">
    <label>Motivo</label>
    <input type="text" name="motivo" placeholder="Ej: compra, ajuste, devolución...">
  </div>
  <div class="acciones-form">
    <button type="submit" class="btn btn-primario">Registrar</button>
    <a href="{% url 'inventario:movimientos' %}" class="btn">Cancelar</a>
  </div>
</form>
{% endblock %}
