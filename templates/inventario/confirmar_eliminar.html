{% extends 'inventario/base.html' %}
{% block title %}Confirmar eliminación{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm text-center">
      <div class="card-body p-5">
        <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-4"
             style="width: 72px; height: 72px;">
          <i class="bi bi-trash3 text-danger fs-2"></i>
        </div>
        <h5 class="fw-bold mb-2">¿Eliminar {{ tipo }}?</h5>
        <p class="text-muted mb-1">Estás a punto de eliminar:</p>
        <p class="fw-semibold fs-5 mb-3">{{ objeto }}</p>
        <div class="alert alert-warning py-2 small text-start">
          <i class="bi bi-exclamation-triangle me-1"></i>
          Esta acción no se puede deshacer.
        </div>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash me-1"></i>Sí, eliminar
          </button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
