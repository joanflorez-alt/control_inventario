{% extends 'inventario/base.html' %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="margin-top: -2rem;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 420px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="bg-dark rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
             style="width: 64px; height: 64px; background-color: #1a1a2e !important;">
          <i class="bi bi-box-seam text-white fs-3"></i>
        </div>
        <h4 class="fw-bold mb-1">Control de Inventario</h4>
        <p class="text-muted small">Ingresa tus credenciales para continuar</p>
      </div>

      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ msg }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">Usuario</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input type="text" name="username" class="form-control border-start-0 ps-0"
                   placeholder="Tu nombre de usuario" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" name="password" class="form-control border-start-0 ps-0"
                   placeholder="Tu contraseña" required>
          </div>
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold"
                style="background-color: #1a1a2e; border-color: #1a1a2e;">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
